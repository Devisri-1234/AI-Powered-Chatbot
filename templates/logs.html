<!DOCTYPE html>
<html>
<head>
<title>Chat Logs</title>
</head>

<body>

<h2>Chat History</h2>

<table border="1">

<tr>
<th>ID</th>
<th>User</th>
<th>Bot</th>
</tr>

{% for chat in chats %}

<tr>
<td>{{chat[0]}}</td>
<td>{{chat[1]}}</td>
<td>{{chat[2]}}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
